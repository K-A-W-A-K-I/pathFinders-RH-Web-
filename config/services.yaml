# This file is the entry point to configure your own services.
parameters:
    images_categories_directory: '%kernel.project_dir%/public/uploads/categories'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\FileUploader:
        arguments:
            $targetDirectory: '%images_categories_directory%'

    App\Service\CandidatureMailer:
        arguments:
            $fromEmail: '%env(MAILER_FROM)%'

    App\Service\AiService:
        arguments:
            $apiKey: '%env(OPENROUTER_API_KEY)%'
