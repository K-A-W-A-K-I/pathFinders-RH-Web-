security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_CANDIDAT: ROLE_USER
        ROLE_WORKER:   ROLE_USER
        ROLE_ADMIN:    [ROLE_WORKER, ROLE_USER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: auth_login
                check_path: auth_login_check
                username_parameter: _username
                password_parameter: _password
                default_target_path: auth_redirect
                always_use_default_target_path: false
                use_referer: false
            logout:
                path: auth_logout
                target: auth_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/formations/inscrire, roles: ROLE_USER }